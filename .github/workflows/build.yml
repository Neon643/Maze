name: Build releases

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: mazeAlgorithm-macos-arm64
            binary: target/aarch64-apple-darwin/release/mazeAlgorithm

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: mazeAlgorithm-linux-x86_64
            binary: target/x86_64-unknown-linux-gnu/release/mazeAlgorithm

          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: mazeAlgorithm-windows-x86_64
            binary: target/x86_64-pc-windows-msvc/release/mazeAlgorithm.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}